<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Certifications | Ashish Kumar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --primary-color: #635BFF;
      --primary-hover: #0A2540;
      --text-dark: #0A2540;
      --text-body: #425466;
      --bg-light: #F6F9FC;
      --white: #FFFFFF;
      --border-radius-lg: 16px;
      --shadow-sm: 0 2px 5px rgba(50, 50, 93, 0.1), 0 1px 1px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 13px 27px -5px rgba(50, 50, 93, 0.25), 0 8px 16px -8px rgba(0, 0, 0, 0.3);
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--text-body); background-color: var(--white); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    h1, h2, h3 { color: var(--text-dark); margin: 0 0 15px 0; line-height: 1.2; }
    a { color: var(--primary-color); text-decoration: none; font-weight: 600; transition: color 0.2s ease; }
    a:hover { color: var(--primary-hover); }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; max-width: 1100px; margin: 0 auto; }
    .nav-logo { font-size: 1.25rem; font-weight: 700; color: var(--text-dark); letter-spacing: -0.5px; }
    .nav-links a { margin-left: 25px; color: var(--text-body); font-size: 0.95rem; font-weight: 500; }
    .nav-links a:hover { color: var(--primary-color); }

    .hero { padding: 60px 20px 80px; background: var(--bg-light); text-align: center; border-bottom: 1px solid #e3e8ee;}
    .hero h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
    .hero p { font-size: 1.1rem; max-width: 600px; margin: 0 auto; color: var(--text-body); }

    .section-container { max-width: 1100px; margin: 40px auto 100px; padding: 0 20px;}
    .card { background: var(--white); border-radius: var(--border-radius-lg); padding: 40px; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.04); margin-bottom: 30px;}
    
    .badge-gallery { display: flex; flex-wrap: wrap; gap: 30px; margin-top: 20px; align-items: flex-start; }
    .badge-card { display: flex; flex-direction: column; align-items: center; width: 170px; }
    .badge-label { margin-top: 10px; text-align: center; font-size: 0.9rem; line-height: 1.35; font-weight: 500; color: var(--text-dark);}
    .credly-embed { width: 150px; min-height: 270px; }

    @media (max-width: 900px) { nav { flex-direction: column; gap: 15px; } .badge-gallery { justify-content: center; } }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Ashish Kumar</div>
    <div class="nav-links">
      <a href="/">&larr; Back to Home</a>
      <a href="#aws">AWS</a>
      <a href="#comptia">CompTIA</a>
      <a href="https://github.com/ackumar51" target="_blank">GitHub</a>
    </div>
  </nav>

  <header class="hero">
    <h1>Digital Badges</h1>
    <p>Verifiable industry credentials in cloud architecture, artificial intelligence, networking, and IT infrastructure.</p>
  </header>

  <main class="section-container">
    
    <div class="card" id="aws">
      <h3 style="border-bottom: 2px solid #e3e8ee; padding-bottom: 10px;">Amazon Web Services</h3>
      <div class="badge-gallery">
        <div class="badge-card">
          <div class="credly-embed" data-iframe-width="150" data-iframe-height="270" data-share-badge-id="8272e643-bb7e-42ec-b36f-753a081b35a7" data-share-badge-host="https://www.credly.com"></div>
          <div class="badge-label">Solutions Architect – Associate</div>
        </div>
        <div class="badge-card">
          <div class="credly-embed" data-iframe-width="150" data-iframe-height="270" data-share-badge-id="f76239c5-a90e-460c-9d42-906bb0a6e12f" data-share-badge-host="https://www.credly.com"></div>
          <div class="badge-label">AI Practitioner</div>
        </div>
      </div>
    </div>

    <div class="card" id="comptia">
      <h3 style="border-bottom: 2px solid #e3e8ee; padding-bottom: 10px;">CompTIA</h3>
      <div class="badge-gallery">
        <div class="badge-card">
          <div class="credly-embed" data-iframe-width="150" data-iframe-height="270" data-share-badge-id="19d3b743-fe07-492a-801c-243ee365d7d9" data-share-badge-host="https://www.credly.com"></div>
          <div class="badge-label">Security+</div>
        </div>
        <div class="badge-card">
          <div class="credly-embed" data-iframe-width="150" data-iframe-height="270" data-share-badge-id="e5f759ba-e173-4674-8267-a0e59810ca76" data-share-badge-host="https://www.credly.com"></div>
          <div class="badge-label">Network+</div>
        </div>
        <div class="badge-card">
          <div class="credly-embed" data-iframe-width="150" data-iframe-height="270" data-share-badge-id="2d915d22-c147-4598-a402-c49c37e4528c" data-share-badge-host="https://www.credly.com"></div>
          <div class="badge-label">A+</div>
        </div>
      </div>
    </div>

  </main>

  <script async src="https://cdn.credly.com/assets/utilities/embed.js"></script>

</body>
</html>
